name: Generate HTML Artifacts

on:
  push:
    branches: [main]
    paths:
      - 'TODO.md'
      - 'templates/tarim-shaiel-campaign-frame-v2.md'
      - 'world/**/*.md'
      - 'narrative/**/*.md'
      - 'utilities/legendkeeper-pipeline/generate_world_html.py'
      - 'utilities/legendkeeper-pipeline/generate_all_world_html.py'
  workflow_dispatch:  # allows manual trigger from GitHub Actions UI

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Generate TODO dashboard
        run: python utilities/dashboard/generate_dashboard.py --out docs/dashboard.html

      - name: Generate campaign frame
        run: python utilities/campaign_frame/generate_campaign_frame.py --out docs/campaign-frame.html

      - name: Generate world HTML + index
        run: python utilities/legendkeeper-pipeline/generate_all_world_html.py

      - name: Commit generated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet && echo "No changes to commit." || (
            git commit -m "chore: regenerate HTML artifacts [skip ci]"
            git push
          )
